<div class="login-container">
  <mat-card class="login-card mat-elevation-z4">
    
    <div class="header-content">
      <h1 >Cobranzas<span class="title-dif">Pro</span></h1>
      <p >Portal de gestión predictiva</p>
    </div>
    
    <div class="form-group">
      <label for="email-input">Correo Electrónico</label>
      <input id="email-input" 
             type="email" 
             [(ngModel)]="email"
             class="custom-input"
             placeholder="email@gmail.com"
             name="email">
    </div>
    
<div class="form-group password-group">
  <label for="password-input">Contraseña</label>
  
  <input id="password-input" 
         [type]="hidePassword ? 'password' : 'text'"
         [(ngModel)]="password"
         class="custom-input"
         placeholder="Contraseña"
         name="password">

  <span class="material-symbols-outlined toggle-password" 
        (click)="togglePassword()">
    {{ hidePassword ? 'visibility' : 'visibility_off' }}
  </span>
</div>

    
    <button class="primary-button"
            (click)="onLogin()" 
            >
      INICIAR SESIÓN
    </button>
    
    <div class="footer-links">
        <a href="#" class="link-secondary">Olvidé mi contraseña</a>
        <a href="#" class="link-secondary">Soporte</a>
    </div>

  </mat-card>
</div>
